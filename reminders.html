<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>所有通知</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 24px 32px 100px;
      max-width: 1280px;
      margin: 0 auto;
    }

    #list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e3a5f;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f59e0b;
    }

    header a { display: none; }

    .back-btn {
      position: fixed;
      bottom: 32px;
      right: 28px;
      font-size: 18px;
      color: #1a1000;
      text-decoration: none;
      background: #f59e0b;
      border: 2px solid #f59e0b;
      border-radius: 24px;
      padding: 14px 28px;
      z-index: 100;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    }

    .item {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    .item-icon { font-size: 36px; flex-shrink: 0; }

    .item-body { flex: 1; }

    .item-type {
      font-size: 13px;
      color: #64b5f6;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .item-title {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .item-time {
      font-size: 28px;
      font-weight: 800;
      color: #f59e0b;
      margin-bottom: 6px;
    }

    .item-date {
      font-size: 14px;
      color: #90caf9;
      margin-bottom: 8px;
    }

    .item-note {
      font-size: 16px;
      color: #81c784;
    }

    .day-badge {
      display: inline-block;
      font-size: 14px;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 20px;
      vertical-align: middle;
      margin-left: 10px;
    }
    .day-badge.today    { background: #16a34a; color: #ffffff; }
    .day-badge.tomorrow { background: #ea580c; color: #ffffff; }
    .day-badge.later    { background: #7c3aed; color: #ffffff; }

    .checklist-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 7px 14px;
      background: #0d2137; border: 1px solid #1e3a5f;
      border-radius: 10px; cursor: pointer;
      font-size: 14px; color: #90caf9;
      user-select: none;
    }
    .checklist-toggle:hover { border-color: #3b7dd8; }

    .checklist-body {
      margin-top: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .checklist-body.open { display: flex; }

    .checklist-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 14px;
      background: #0d2137; border: 1px solid #1e3a5f;
      border-radius: 10px; cursor: pointer;
      font-size: 18px; color: #e2e8f0;
      user-select: none; transition: all .15s;
    }
    .checklist-item.done {
      background: #0a1e0e; border-color: #22c55e44;
      color: #64748b; text-decoration: line-through;
    }
    .checklist-tick {
      width: 24px; height: 24px; border-radius: 6px;
      border: 2px solid #1e3a5f; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all .15s;
    }
    .checklist-item.done .checklist-tick {
      background: #22c55e; border-color: #22c55e; color: #fff;
    }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>

  <header>
    <h1>📋 即将到来的通知</h1>
  </header>
  <a class="back-btn" href="index.html">← 返回</a>

  <div id="list">加载中...</div>

  <script>
    const ICONS = {
      coles: '🚚', visit: '🏠', power: '⚡', custom: '📝', trip: '🧳'
    };
    const LABELS = {
      coles: 'Coles 送货', visit: '家庭通知', power: '免费用电', custom: '通知', trip: '家庭旅行'
    };

    function relativeDay(d) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const dt = parseItemDateTime(d);
      const itemDay = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
      const diff = Math.round((itemDay - today) / 86400000);
      if (diff === 0) return { text: '今天', cls: 'today' };
      if (diff === 1) return { text: '明天', cls: 'tomorrow' };
      if (diff === 2) return { text: '后天', cls: 'later' };
      return { text: `${diff}天后`, cls: 'later' };
    }

    function badgeHTML(d) {
      const b = relativeDay(d);
      return b ? `<span class="day-badge ${b.cls}">${b.text}</span>` : '';
    }

    function renderItem(d) {
      const icon  = d.icon || ICONS[d.type] || '📝';
      const label = LABELS[d.type] || d.label || '通知';

      let title = '', time = '', date = '', note = '';

      if (d.type === 'coles') {
        title = `${d.date} 送货上门`;
        time  = d.time;
        date  = d.fulldate || '';
        note  = d.note ? `Cindy 说：${d.note}` : '请在家等候送货员 🏠 听到门铃请去开门';
      } else if (d.type === 'visit') {
        title = `${d.who || 'Cindy'} ${d.date}来家里`;
        time  = d.time;
        date  = d.fulldate || '';
        note  = d.note ? `Cindy 说：${d.note}` : '';
      } else if (d.type === 'power') {
        title = `${d.date}免费用电时段`;
        time  = d.time;
        date  = d.fulldate || '';
        note  = d.note ? `Cindy 说：${d.note}` : '请使用洗衣机、烘干机等电器';
      } else if (d.type === 'trip') {
        title = `${d.date} 去 ${d.destination}`;
        time  = d.time;
        date  = d.fulldate || '';
        note  = d.note ? `Cindy 说：${d.note}` : '';
      } else if (d.type === 'custom') {
        title = d.label || '通知';
        note  = d.message || '';
      }

      const clKey = `checklist_${d.fulldate || d.date}_${d.destination || d.label || ''}`;
      const clDone = (() => { try { return new Set(JSON.parse(localStorage.getItem(clKey) || '[]')); } catch { return new Set(); } })();
      const clHTML = d.checklist && d.checklist.length ? `
        <div class="checklist-toggle" onclick="toggleChecklist(this)">☑ 出行清单（${d.checklist.length} 项）▾</div>
        <div class="checklist-body">
          ${d.checklist.map((item, i) => `
            <div class="checklist-item${clDone.has(i) ? ' done' : ''}" onclick="tickItem(this,'${clKey}',${i},${JSON.stringify(d.checklist).replace(/"/g,'&quot;')})">
              <span class="checklist-tick">${clDone.has(i) ? '✓' : ''}</span>
              ${item}
            </div>`).join('')}
        </div>` : '';

      return `
        <div class="item">
          <div class="item-icon">${icon}</div>
          <div class="item-body">
            <div class="item-type">${label}</div>
            <div class="item-title">${title}${badgeHTML(d)}</div>
            ${time ? `<div class="item-time">${time}</div>` : ''}
            ${date ? `<div class="item-date">${date}</div>` : ''}
            ${note ? `<div class="item-note">${note}</div>` : ''}
            ${clHTML}
          </div>
        </div>`;
    }

    function toggleChecklist(btn) {
      const body = btn.nextElementSibling;
      const open = body.classList.toggle('open');
      btn.textContent = open
        ? btn.textContent.replace('▾', '▴')
        : btn.textContent.replace('▴', '▾');
    }

    function tickItem(el, key, idx, items) {
      let done;
      try { done = new Set(JSON.parse(localStorage.getItem(key) || '[]')); } catch { done = new Set(); }
      if (done.has(idx)) { done.delete(idx); el.classList.remove('done'); el.querySelector('.checklist-tick').textContent = ''; }
      else               { done.add(idx);    el.classList.add('done');    el.querySelector('.checklist-tick').textContent = '✓'; }
      localStorage.setItem(key, JSON.stringify([...done]));
    }

    function parseItemDateTime(d) {
      const now = new Date();
      let year = now.getFullYear(), month = now.getMonth(), day = now.getDate();
      if (d.fulldate) {
        const m = d.fulldate.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (m) { year = parseInt(m[1]); month = parseInt(m[2]) - 1; day = parseInt(m[3]); }
      } else if (d.date === '明天') {
        const t = new Date(now); t.setDate(t.getDate() + 1);
        year = t.getFullYear(); month = t.getMonth(); day = t.getDate();
      }
      let hour = 0, minute = 0;
      const tm = (d.time || '').match(/(上午|早上|下午|晚上)?\s*(\d{1,2}):(\d{2})/);
      if (tm) {
        const p = tm[1] || '';
        hour = parseInt(tm[2]); minute = parseInt(tm[3]);
        if ((p === '下午' || p === '晚上') && hour < 12) hour += 12;
        if ((p === '上午' || p === '早上') && hour === 12) hour = 0;
      }
      return new Date(year, month, day, hour, minute);
    }

    fetch('history.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (!data.length) {
          document.getElementById('list').innerHTML = '<p style="color:#546e7a">暂无通知记录</p>';
          return;
        }
        const now = new Date();
        const upcoming = data.filter(d => parseItemDateTime(d) >= now)
                             .sort((a, b) => parseItemDateTime(a) - parseItemDateTime(b));
        document.getElementById('list').innerHTML = upcoming.length
          ? upcoming.map(renderItem).join('')
          : '<p style="color:#546e7a">暂无即将到来的通知</p>';
      });
  </script>
  <script src="theme.js"></script>
</body>
</html>
