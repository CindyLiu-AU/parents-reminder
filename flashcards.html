<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>英语单词卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 28px 28px 100px;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e3a5f;
      flex-wrap: wrap;
    }

    header h1 { font-size: 28px; font-weight: 700; color: #f59e0b; }
    header p   { font-size: 14px; color: #546e7a; }

    .counters {
      margin-left: auto;
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }
    .counter-dad { font-size: 15px; font-weight: 700; color: #38bdf8; white-space: nowrap; }
    .counter-mum { font-size: 15px; font-weight: 700; color: #f472b6; white-space: nowrap; }

    /* ── grid ── */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 36px;
    }

    /* ── card wrapper ── */
    .card-wrap { display: flex; flex-direction: column; gap: 10px; }

    /* ── Flip card ── */
    .scene {
      perspective: 900px;
      height: 280px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
    }

    .flip-card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .front { background: #112240; border: 1px solid #1e3a5f; }
    .back  { background: #0d2745; border: 1px solid #2e5f9e; transform: rotateY(180deg); }

    /* card glow by who knows it */
    .card-wrap.dad .front         { border-color: #38bdf8; box-shadow: 0 0 14px rgba(56,189,248,0.22); }
    .card-wrap.mum .front         { border-color: #f472b6; box-shadow: 0 0 14px rgba(244,114,182,0.22); }
    .card-wrap.dad.mum .front     { border-color: #22c55e; box-shadow: 0 0 18px rgba(34,197,94,0.30); }

    .word-en {
      font-size: 40px;
      font-weight: 800;
      color: #f59e0b;
      letter-spacing: 2px;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .play-btn {
      margin-top: 16px;
      background: #1e3a6e;
      border: 1px solid #2e5f9e;
      border-radius: 20px;
      padding: 8px 22px;
      color: #90caf9;
      font-size: 18px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .play-btn:active { background: #2e5f9e; }

    .tap-hint { font-size: 13px; color: #546e7a; margin-top: 10px; }
    .word-cn  { font-size: 28px; font-weight: 700; color: #2dd4bf; margin-bottom: 10px; }
    .word-desc { font-size: 14px; color: #90caf9; line-height: 1.8; }
    .flip-hint-back { margin-top: 14px; font-size: 12px; color: #2e4a6a; }

    /* ── Known buttons row ── */
    .btn-row { display: flex; gap: 8px; }

    .known-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 14px;
      border: 2px solid #1e3a5f;
      background: #112240;
      color: #546e7a;
      font-size: 15px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .known-btn-dad:hover       { border-color: #38bdf8; color: #38bdf8; }
    .known-btn-dad.known       { background: #0a1e30; border-color: #38bdf8; color: #38bdf8; }

    .known-btn-mum:hover       { border-color: #f472b6; color: #f472b6; }
    .known-btn-mum.known       { background: #2d0a1a; border-color: #f472b6; color: #f472b6; }

    /* ── Back button ── */
    .back-btn {
      position: fixed;
      bottom: 32px;
      right: 28px;
      font-size: 18px;
      color: #1a1000;
      text-decoration: none;
      background: #f59e0b;
      border: 2px solid #f59e0b;
      border-radius: 24px;
      padding: 14px 28px;
      z-index: 100;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    }
  </style>
</head>
<body>

  <header>
    <h1>📖 英语单词卡</h1>
    <p>点击卡片查看翻译和解释</p>
    <div class="counters">
      <span class="counter-dad" id="counter-dad"></span>
      <span class="counter-mum" id="counter-mum"></span>
    </div>
  </header>

  <div class="cards-row" id="cards-row"></div>

  <a class="back-btn" href="index.html">← 返回</a>

  <script>
    const KEY_DAD = 'flashcard_known_dad';
    const KEY_MUM = 'flashcard_known_mum';

    function loadSet(key) {
      try { return new Set(JSON.parse(localStorage.getItem(key) || '[]')); }
      catch { return new Set(); }
    }
    function saveSet(key, set) {
      localStorage.setItem(key, JSON.stringify([...set]));
    }

    // migrate old single-key data → dad's record
    const legacy = localStorage.getItem('flashcard_known');
    if (legacy) {
      const existing = loadSet(KEY_DAD);
      try { JSON.parse(legacy).forEach(w => existing.add(w)); } catch {}
      saveSet(KEY_DAD, existing);
      localStorage.removeItem('flashcard_known');
    }

    let dad = loadSet(KEY_DAD);
    let mum = loadSet(KEY_MUM);
    let total = 0;

    function updateCounters() {
      document.getElementById('counter-dad').textContent = `👨 爸爸认识 ${dad.size} / ${total}`;
      document.getElementById('counter-mum').textContent = `👩 妈妈认识 ${mum.size} / ${total}`;
    }

    function render(words) {
      total = words.length;
      document.getElementById('cards-row').innerHTML = words.map((w, i) => {
        const dKnown = dad.has(w.word);
        const mKnown = mum.has(w.word);
        const wrapClass = ['card-wrap', dKnown ? 'dad' : '', mKnown ? 'mum' : ''].filter(Boolean).join(' ');
        return `
        <div class="${wrapClass}" id="wrap-${i}">
          <div class="scene" onclick="flip(this)">
            <div class="flip-card">
              <div class="face front">
                <div class="word-en">${w.word}</div>
                <button class="play-btn" onclick="speak('${w.word}', event)">🔊 发音</button>
                <div class="tap-hint">点击卡片查看翻译 👆</div>
              </div>
              <div class="face back">
                <div class="word-cn">${w.word_cn}</div>
                <div class="word-desc">${w.desc}</div>
                <div class="flip-hint-back">再次点击翻回</div>
              </div>
            </div>
          </div>
          <div class="btn-row">
            <button class="known-btn known-btn-dad${dKnown ? ' known' : ''}"
                    onclick="toggle('${w.word}', 'dad', ${i}, event)">
              ${dKnown ? '✅ 爸爸认识' : '☐ 爸爸认识'}
            </button>
            <button class="known-btn known-btn-mum${mKnown ? ' known' : ''}"
                    onclick="toggle('${w.word}', 'mum', ${i}, event)">
              ${mKnown ? '✅ 妈妈认识' : '☐ 妈妈认识'}
            </button>
          </div>
        </div>`;
      }).join('');
      updateCounters();
    }

    function toggle(word, who, idx, event) {
      event.stopPropagation();
      const wrap = document.getElementById('wrap-' + idx);
      const set  = who === 'dad' ? dad : mum;
      const key  = who === 'dad' ? KEY_DAD : KEY_MUM;
      const btn  = wrap.querySelector('.known-btn-' + who);
      const label = who === 'dad' ? '爸爸认识' : '妈妈认识';

      if (set.has(word)) {
        set.delete(word);
        btn.classList.remove('known');
        btn.textContent = '☐ ' + label;
        wrap.classList.remove(who);
      } else {
        set.add(word);
        btn.classList.add('known');
        btn.textContent = '✅ ' + label;
        wrap.classList.add(who);
      }
      saveSet(key, set);
      updateCounters();
    }

    function speak(word, event) {
      event.stopPropagation();
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(word);
      utter.lang = 'en-AU';
      function doSpeak() {
        const voices = speechSynthesis.getVoices();
        const voice = voices.find(v => v.name === 'Karen')
                   || voices.find(v => v.lang === 'en-AU')
                   || voices.find(v => v.lang.startsWith('en'));
        if (voice) utter.voice = voice;
        speechSynthesis.speak(utter);
      }
      if (speechSynthesis.getVoices().length) { doSpeak(); }
      else { speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; doSpeak(); }; }
    }

    function flip(scene) {
      scene.querySelector('.flip-card').classList.toggle('flipped');
    }

    fetch('words.json?t=' + Date.now())
      .then(r => r.json())
      .then(render);
  </script>
</body>
</html>
