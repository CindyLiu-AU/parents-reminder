<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>单词练习</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 24px 28px 80px;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
    }

    header h1 { font-size: 26px; font-weight: 700; color: #f59e0b; }
    header p  { font-size: 14px; color: #546e7a; }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 9px 20px;
      border-radius: 20px;
      border: 1px solid #1e3a5f;
      background: #112240;
      color: #7b9eb5;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { color: #90caf9; background: #0d2137; }

    .tab-btn.active {
      background: #f59e0b;
      border-color: #f59e0b;
      color: #1a1000;
    }

    .frame-wrap {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #1e3a5f;
      height: 820px;
    }

    .frame-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .back-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      font-size: 18px;
      color: #1a1000;
      text-decoration: none;
      background: #f59e0b;
      border: 2px solid #f59e0b;
      border-radius: 24px;
      padding: 12px 26px;
      z-index: 100;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    }
  </style>
</head>
<body>

  <header>
    <h1>📖 单词练习</h1>
    <p>Quizlet 记忆卡</p>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="frame-wrap">
    <iframe id="quizlet-frame" src="" allowfullscreen></iframe>
  </div>

  <a class="back-btn" href="index.html">← 返回</a>

  <script>
    const SETS = [
      { label: '常用单词', id: '1169736543' },
    ];

    const frame = document.getElementById('quizlet-frame');
    const tabsEl = document.getElementById('tabs');

    function showSet(i) {
      frame.src = 'https://quizlet.com/' + SETS[i].id + '/flashcards/embed?i=4pkj5g&x=1jqt';
      document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', i === j));
    }

    SETS.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = s.label;
      btn.onclick = () => showSet(i);
      tabsEl.appendChild(btn);
    });

    showSet(0);
  </script>
</body>
</html>
