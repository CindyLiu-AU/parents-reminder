<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>英语单词卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 28px 28px 100px;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e3a5f;
    }

    header h1 { font-size: 28px; font-weight: 700; color: #f59e0b; }
    header p   { font-size: 14px; color: #546e7a; }

    .known-counter {
      margin-left: auto;
      font-size: 15px;
      font-weight: 700;
      color: #2dd4bf;
      white-space: nowrap;
    }

    /* ── grid ── */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 36px;
    }

    /* ── card wrapper ── */
    .card-wrap { display: flex; flex-direction: column; gap: 10px; }

    /* ── Flip card ── */
    .scene {
      perspective: 900px;
      height: 280px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
    }

    .flip-card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .front {
      background: #112240;
      border: 1px solid #1e3a5f;
    }

    .back {
      background: #0d2745;
      border: 1px solid #2e5f9e;
      transform: rotateY(180deg);
    }

    /* known glow */
    .card-wrap.known .front {
      border-color: #22c55e;
      box-shadow: 0 0 16px rgba(34,197,94,0.25);
    }
    .card-wrap.known .back {
      border-color: #22c55e;
    }

    .word-en {
      font-size: 40px;
      font-weight: 800;
      color: #f59e0b;
      letter-spacing: 2px;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .play-btn {
      margin-top: 16px;
      background: #1e3a6e;
      border: 1px solid #2e5f9e;
      border-radius: 20px;
      padding: 8px 22px;
      color: #90caf9;
      font-size: 18px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .play-btn:active { background: #2e5f9e; }

    .tap-hint { font-size: 13px; color: #546e7a; margin-top: 10px; }

    .word-cn { font-size: 28px; font-weight: 700; color: #2dd4bf; margin-bottom: 10px; }
    .word-desc { font-size: 14px; color: #90caf9; line-height: 1.8; }
    .flip-hint-back { margin-top: 14px; font-size: 12px; color: #2e4a6a; }

    /* ── Known button ── */
    .known-btn {
      width: 100%;
      padding: 10px;
      border-radius: 14px;
      border: 2px solid #1e3a5f;
      background: #112240;
      color: #546e7a;
      font-size: 16px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .known-btn:hover { border-color: #22c55e; color: #22c55e; }
    .known-btn.known {
      background: #052e16;
      border-color: #22c55e;
      color: #22c55e;
    }

    /* ── Back button ── */
    .back-btn {
      position: fixed;
      bottom: 32px;
      right: 28px;
      font-size: 18px;
      color: #1a1000;
      text-decoration: none;
      background: #f59e0b;
      border: 2px solid #f59e0b;
      border-radius: 24px;
      padding: 14px 28px;
      z-index: 100;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    }
  </style>
</head>
<body>

  <header>
    <h1>📖 英语单词卡</h1>
    <p>点击卡片查看翻译和解释</p>
    <span class="known-counter" id="counter"></span>
  </header>

  <div class="cards-row" id="cards-row"></div>

  <a class="back-btn" href="index.html">← 返回</a>

  <script>
    const STORAGE_KEY = 'flashcard_known';

    function loadKnown() {
      try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
      catch { return new Set(); }
    }

    function saveKnown(set) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
    }

    let known = loadKnown();
    let totalWords = 0;

    function updateCounter() {
      document.getElementById('counter').textContent = `已认识 ${known.size} / ${totalWords} 个单词 ✨`;
    }

    function render(words) {
      totalWords = words.length;
      document.getElementById('cards-row').innerHTML = words.map(w => {
        const isKnown = known.has(w.word);
        return `
        <div class="card-wrap${isKnown ? ' known' : ''}" id="wrap-${w.word}">
          <div class="scene" onclick="flip(this)">
            <div class="flip-card">
              <div class="face front">
                <div class="word-en">${w.word}</div>
                <button class="play-btn" onclick="speak('${w.audio||''}', event)">🔊 发音</button>
                <div class="tap-hint">点击卡片查看翻译 👆</div>
              </div>
              <div class="face back">
                <div class="word-cn">${w.word_cn}</div>
                <div class="word-desc">${w.desc}</div>
                <div class="flip-hint-back">再次点击翻回</div>
              </div>
            </div>
          </div>
          <button class="known-btn${isKnown ? ' known' : ''}"
                  onclick="toggleKnown('${w.word}', event)">
            ${isKnown ? '✅ 已认识' : '☐ 我认识'}
          </button>
        </div>`;
      }).join('');
      updateCounter();
    }

    function toggleKnown(word, event) {
      event.stopPropagation();
      const wrap = document.getElementById('wrap-' + word);
      const btn  = wrap.querySelector('.known-btn');
      if (known.has(word)) {
        known.delete(word);
        wrap.classList.remove('known');
        btn.classList.remove('known');
        btn.textContent = '☐ 我认识';
      } else {
        known.add(word);
        wrap.classList.add('known');
        btn.classList.add('known');
        btn.textContent = '✅ 已认识';
      }
      saveKnown(known);
      updateCounter();
    }

    function speak(audioUrl, event) {
      event.stopPropagation();
      if (!audioUrl) return;
      new Audio(audioUrl + '?v=1').play().catch(() => {});
    }

    function flip(scene) {
      scene.querySelector('.flip-card').classList.toggle('flipped');
    }

    fetch('words.json?t=' + Date.now())
      .then(r => r.json())
      .then(render);
  </script>
</body>
</html>
