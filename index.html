<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭通知</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* ── Top bar: clock + weather ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #091525;
      border-bottom: 1px solid #1e3a5f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      z-index: 100;
    }

    #clock {
      font-size: 36px;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: 2px;
    }

    #date-display {
      font-size: 16px;
      color: #64b5f6;
      margin-top: 2px;
    }

    #weather {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: right;
    }

    #weather-icon { font-size: 36px; }

    #weather-temp {
      font-size: 32px;
      font-weight: 700;
      color: #f1f5f9;
    }

    #weather-desc {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 2px;
    }

    #weather-location {
      font-size: 13px;
      color: #546e7a;
    }

    /* ── Main card ── */
    .card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 24px;
      padding: 48px 80px;
      max-width: 860px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
      margin-top: 90px;
      margin-bottom: 60px;
    }

    .icon { font-size: 72px; margin-bottom: 20px; }
    .label { font-size: 20px; color: #64b5f6; letter-spacing: 3px; margin-bottom: 16px; }
    .title { font-size: 48px; font-weight: 700; color: #ffffff; margin-bottom: 10px; line-height: 1.2; }
    .subtitle { font-size: 24px; color: #90caf9; margin-bottom: 36px; }

    .time-box {
      background: #f59e0b;
      border-radius: 16px;
      padding: 24px 48px;
      display: inline-block;
      margin-bottom: 32px;
    }
    .time-label { font-size: 16px; color: #1a1000; font-weight: 600; margin-bottom: 4px; }
    .time { font-size: 52px; font-weight: 800; color: #1a1000; letter-spacing: 2px; }
    .note { font-size: 24px; color: #81c784; line-height: 1.7; }

    .word { font-size: 88px; font-weight: 800; color: #f59e0b; margin-bottom: 10px; letter-spacing: 4px; }
    .question { font-size: 26px; color: #90caf9; margin-bottom: 36px; }
    .answer-box {
      background: #1a3a1a; border: 2px solid #2dd4bf;
      border-radius: 16px; padding: 28px 48px; margin-bottom: 24px; display: none;
    }
    .answer-box.visible { display: block; }
    .answer-cn { font-size: 40px; font-weight: 700; color: #2dd4bf; margin-bottom: 10px; }
    .answer-desc { font-size: 20px; color: #f1f5f9; line-height: 1.7; }
    .tap-hint { font-size: 18px; color: #546e7a; margin-top: 6px; }

    .custom-msg { font-size: 36px; color: #f1f5f9; line-height: 1.7; margin-bottom: 16px; }
    .footer { margin-top: 28px; font-size: 14px; color: #546e7a; }

    #sound-banner { display: none; }

    #timeslot-badge { display: none; }

    /* ── Bottom rotation bar ── */
    #bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #091525;
      border-top: 1px solid #1e3a5f;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      z-index: 100;
    }

    #bottombar .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a2a40;
      border: 1px solid #2e3a52;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #94a3b8;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #bottombar .pill.active {
      background: #1e3a6e;
      border-color: #f59e0b;
      color: #f59e0b;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="topbar">
    <div>
      <div id="clock">--:--</div>
      <div id="date-display">--</div>
    </div>
    <div id="weather">
      <div id="weather-icon">🌤</div>
      <div>
        <div id="weather-temp">--°C</div>
        <div id="weather-desc">加载中...</div>
        <div id="weather-location">📍 Kingston, TAS</div>
      </div>
    </div>
  </div>

  <div id="sound-banner">🔔 点击屏幕任意位置，开启新通知提示音</div>
  <div class="card" id="card" onclick="handleTap()"></div>
  <div id="timeslot-badge"></div>
  <div id="bottombar"></div>

  <script>
    // ── Weather code → emoji + description ───────────────────
    const WMO = {
      0:  ['☀️','晴天'], 1: ['🌤','基本晴'], 2: ['⛅','多云'],
      3:  ['☁️','阴天'], 45: ['🌫','有雾'], 48: ['🌫','冻雾'],
      51: ['🌦','小毛毛雨'], 53: ['🌦','毛毛雨'], 55: ['🌧','大毛毛雨'],
      61: ['🌧','小雨'], 63: ['🌧','中雨'], 65: ['🌧','大雨'],
      71: ['🌨','小雪'], 73: ['🌨','中雪'], 75: ['❄️','大雪'],
      80: ['🌦','阵雨'], 81: ['🌧','中阵雨'], 82: ['⛈','强阵雨'],
      95: ['⛈','雷阵雨'], 96: ['⛈','冰雹雷雨'], 99: ['⛈','强冰雹雷雨'],
    };

    // ── Clock ─────────────────────────────────────────────────
    const TZ = 'Australia/Hobart';

    function hobartParts() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat('en-AU', {
        timeZone: TZ, hour12: false,
        year: 'numeric', month: 'numeric', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      }).formatToParts(now);
      const get = (type) => parts.find(p => p.type === type)?.value || '0';
      const hour = parseInt(get('hour'), 10);
      const weekday = new Intl.DateTimeFormat('zh-CN', { timeZone: TZ, weekday: 'long' }).format(now);
      return {
        hour,
        minute:  get('minute'),
        hourStr: String(hour).padStart(2, '0'),
        year:    get('year'),
        month:   get('month'),
        day:     get('day'),
        weekday,
      };
    }

    function updateClock() {
      const p = hobartParts();
      const ampm = p.hour < 12 ? 'AM' : 'PM';
      const h12 = p.hour % 12 || 12;
      document.getElementById('clock').textContent = `${String(h12).padStart(2,'0')}:${p.minute} ${ampm}`;
      document.getElementById('date-display').textContent =
        `${p.year}年${p.month}月${p.day}日 ${p.weekday}`;
    }

    // ── Weather (Open-Meteo, Kingston TAS) ───────────────────
    async function fetchWeather() {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast' +
          '?latitude=-42.983&longitude=147.067' +
          '&current=temperature_2m,weather_code,wind_speed_10m' +
          '&timezone=Australia%2FHobart';
        const res = await fetch(url);
        const d = await res.json();
        const code = d.current.weather_code;
        const temp = Math.round(d.current.temperature_2m);
        const [icon, desc] = WMO[code] || ['🌡','未知天气'];
        document.getElementById('weather-icon').textContent = icon;
        document.getElementById('weather-temp').textContent = `${temp}°C`;
        document.getElementById('weather-desc').textContent = desc;
      } catch(e) {
        document.getElementById('weather-desc').textContent = '天气获取失败';
      }
    }

    let audioCtx = null;
    function unlockAudio() {
      if (audioCtx) return;
      audioCtx = new AudioContext();
      audioCtx.resume();
    }
    function playChime() {
      if (!audioCtx) return;
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        const t = audioCtx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
      });
    }

    // ── Time slot ─────────────────────────────────────────────
    function getSlot() {
      const h = hobartParts().hour;
      if (h >= 6 && h < 12) return 'morning';
      if (h >= 12 && h < 18) return 'afternoon';
      if (h >= 18 && h < 22) return 'evening';
      return 'night';
    }

    // ── Render ────────────────────────────────────────────────
    function render(d) {
      const card = document.getElementById('card');
      if (d.type === 'coles') {
        card.innerHTML = `
          <div class="icon">🚚</div>
          <div class="label">Coles 网购送货</div>
          <div class="title">${d.date} 送货上门</div>
          <div class="subtitle">${d.fulldate || ''}</div>
          <div class="time-box">
            <div class="time-label">送货时间</div>
            <div class="time">${d.time}</div>
          </div>
          <div class="note">${d.note || '请在家等候送货员 🏠 听到门铃请去开门'}</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;
      } else if (d.type === 'visit') {
        card.innerHTML = `
          <div class="icon">🏠</div>
          <div class="label">家庭通知</div>
          <div class="title">${d.who || 'Cindy'} ${d.date}来家里</div>
          <div class="subtitle">${d.fulldate || ''}</div>
          <div class="time-box">
            <div class="time-label">到达时间</div>
            <div class="time">${d.time}</div>
          </div>
          <div class="note">${d.note || '请在家等候 ❤️'}</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;
      } else if (d.type === 'power') {
        card.innerHTML = `
          <div class="icon">⚡</div>
          <div class="label">电力通知</div>
          <div class="title">${d.date}免费用电时段</div>
          <div class="subtitle">${d.fulldate || ''}</div>
          <div class="time-box">
            <div class="time-label">免费时段</div>
            <div class="time">${d.time}</div>
          </div>
          <div class="note">请在这个时段使用洗衣机、烘干机等电器 🏠<br>可以节省电费哦！</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;
      } else if (d.type === 'word') {
        card.innerHTML = `
          <div class="icon">📚</div>
          <div class="label">今日单词</div>
          <div class="word">${d.word}</div>
          <div class="question">你知道这个词是什么意思吗？</div>
          <div class="answer-box" id="answer">
            <div class="answer-cn">${d.word_cn}</div>
            <div class="answer-desc">${d.desc}</div>
          </div>
          <div class="tap-hint" id="hint">点击屏幕查看答案 👆</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;
      } else if (d.type === 'custom') {
        card.innerHTML = `
          <div class="icon">${d.icon || '📝'}</div>
          <div class="label">${d.label || '通知'}</div>
          <div class="custom-msg">${d.message}</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;
      }
    }

    // ── Bottom bar ────────────────────────────────────────────
    function updateBottomBar(items, activeIdx) {
      const bar = document.getElementById('bottombar');
      if (!items || items.length <= 1) { bar.innerHTML = ''; return; }
      bar.innerHTML = items.map((item, i) => {
        const label = item.word || item.label || item.type || '通知';
        const icon  = item.type === 'word' ? '📚'
                    : item.type === 'coles' ? '🚚'
                    : item.type === 'visit' ? '🏠'
                    : item.type === 'power' ? '⚡'
                    : item.icon || '📝';
        return `<div class="pill ${i === activeIdx ? 'active' : ''}">${icon} ${label}</div>`;
      }).join('');
    }

    // ── Tap handler ───────────────────────────────────────────
    function handleTap() {
      unlockAudio();
      const box = document.getElementById('answer');
      const hint = document.getElementById('hint');
      if (box && hint) {
        box.classList.toggle('visible');
        hint.textContent = box.classList.contains('visible')
          ? '再次点击隐藏答案' : '点击屏幕查看答案 👆';
      }
    }

    // ── Main logic ────────────────────────────────────────────
    let lastData = null;
    let words = [];
    let notices = [];

    async function loadAll() {
      const [w, n] = await Promise.all([
        fetch('words.json?t=' + Date.now()).then(r => r.json()),
        fetch('notices.json?t=' + Date.now()).then(r => r.json()),
      ]);
      words = w;
      notices = n;
    }

    async function tick() {
      const slot = getSlot();
      const badge = document.getElementById('timeslot-badge');
      let data;

      let activeIdx = 0;
      if (slot === 'afternoon') {
        if (notices.length > 0) {
          activeIdx = Math.floor(Date.now() / (5 * 60 * 1000)) % notices.length;
          data = notices[activeIdx];
          updateBottomBar(notices, activeIdx);
        } else {
          activeIdx = Math.floor(Date.now() / (30 * 60 * 1000)) % words.length;
          data = { type: 'word', ...words[activeIdx] };
          updateBottomBar(words, activeIdx);
        }
      } else if (slot === 'night') {
        data = { type: 'custom', icon: '🌙', label: '晚安', message: '爸爸妈妈晚安！<br>好好休息 😴' };
        updateBottomBar([], 0);
      } else if (slot === 'morning') {
        if (notices.length > 0) {
          activeIdx = Math.floor(Date.now() / (5 * 60 * 1000)) % notices.length;
          data = notices[activeIdx];
          updateBottomBar(notices, activeIdx);
        } else {
          data = { type: 'custom', icon: '🌅', label: '早上好', message: '早上好，爸爸妈妈！<br>今天也要开心哦 😊' };
          updateBottomBar([], 0);
        }
      } else {
        if (notices.length > 0) {
          activeIdx = Math.floor(Date.now() / (5 * 60 * 1000)) % notices.length;
          data = notices[activeIdx];
          updateBottomBar(notices, activeIdx);
        } else {
          data = { type: 'custom', icon: '🌆', label: '晚上好', message: '晚上好，爸爸妈妈！<br>好好休息，明天见 😊' };
          updateBottomBar([], 0);
        }
      }

      const dataStr = JSON.stringify(data);
      if (lastData && dataStr !== lastData) {
        playChime();
        setTimeout(() => { lastData = dataStr; render(data); }, 2000);
      } else {
        lastData = dataStr;
        render(data);
      }
    }

    // ── Init ──────────────────────────────────────────────────
    window.onload = async () => {
      document.documentElement.requestFullscreen?.();
      updateClock();
      setInterval(updateClock, 1000);
      await fetchWeather();
      setInterval(fetchWeather, 30 * 60 * 1000);
      await loadAll();
      await tick();
      setInterval(tick, 60000);
    };
  </script>
</body>
</html>
