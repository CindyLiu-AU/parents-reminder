<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭通知</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 24px;
      padding: 60px 80px;
      max-width: 860px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }

    .icon { font-size: 80px; margin-bottom: 24px; }
    .label { font-size: 22px; color: #64b5f6; letter-spacing: 3px; margin-bottom: 20px; }
    .title { font-size: 52px; font-weight: 700; color: #ffffff; margin-bottom: 10px; line-height: 1.2; }
    .subtitle { font-size: 26px; color: #90caf9; margin-bottom: 40px; }

    .time-box {
      background: #f59e0b;
      border-radius: 16px;
      padding: 28px 48px;
      display: inline-block;
      margin-bottom: 36px;
    }
    .time-label { font-size: 18px; color: #1a1000; font-weight: 600; margin-bottom: 6px; }
    .time { font-size: 58px; font-weight: 800; color: #1a1000; letter-spacing: 2px; }
    .note { font-size: 26px; color: #81c784; line-height: 1.7; }

    .word { font-size: 96px; font-weight: 800; color: #f59e0b; margin-bottom: 12px; letter-spacing: 4px; }
    .question { font-size: 28px; color: #90caf9; margin-bottom: 40px; }
    .answer-box {
      background: #1a3a1a; border: 2px solid #2dd4bf;
      border-radius: 16px; padding: 32px 48px; margin-bottom: 28px; display: none;
    }
    .answer-box.visible { display: block; }
    .answer-cn { font-size: 42px; font-weight: 700; color: #2dd4bf; margin-bottom: 12px; }
    .answer-desc { font-size: 22px; color: #f1f5f9; line-height: 1.7; }
    .tap-hint { font-size: 20px; color: #546e7a; margin-top: 8px; }

    .custom-msg { font-size: 38px; color: #f1f5f9; line-height: 1.7; margin-bottom: 20px; }

    .footer { margin-top: 36px; font-size: 16px; color: #546e7a; }

    #sound-banner {
      background: #1e3a6e; border: 1px solid #2dd4bf;
      border-radius: 12px; padding: 14px 32px;
      margin-bottom: 20px; font-size: 18px; color: #2dd4bf;
    }
    #sound-banner.hidden { display: none; }

    #timeslot-badge {
      position: fixed; top: 16px; right: 20px;
      font-size: 14px; color: #546e7a;
    }
  </style>
</head>
<body>
  <div id="sound-banner">🔔 点击屏幕任意位置，开启新通知提示音</div>
  <div class="card" id="card" onclick="handleTap()"></div>
  <div id="timeslot-badge"></div>

  <script>
    // ── Audio ─────────────────────────────────────────────────
    let audioCtx = null;
    let audioUnlocked = false;

    function unlockAudio() {
      if (audioUnlocked) return;
      audioCtx = new AudioContext();
      audioCtx.resume();
      audioUnlocked = true;
      document.getElementById('sound-banner').classList.add('hidden');
    }

    function playChime() {
      if (!audioCtx) return;
      [523, 659, 784, 1047].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        const t = audioCtx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
      });
    }

    // ── Time slot ─────────────────────────────────────────────
    function getSlot() {
      const h = new Date().getHours();
      if (h >= 6 && h < 12) return 'morning';
      if (h >= 12 && h < 18) return 'afternoon';
      if (h >= 18 && h < 22) return 'evening';
      return 'night';
    }

    // ── Render ────────────────────────────────────────────────
    function render(d) {
      const card = document.getElementById('card');

      if (d.type === 'coles') {
        card.innerHTML = `
          <div class="icon">🚚</div>
          <div class="label">Coles 网购送货</div>
          <div class="title">${d.date} 送货上门</div>
          <div class="subtitle">${d.fulldate || ''}</div>
          <div class="time-box">
            <div class="time-label">送货时间</div>
            <div class="time">${d.time}</div>
          </div>
          <div class="note">请在家等候送货员 🏠<br>听到门铃请去开门</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;

      } else if (d.type === 'visit') {
        card.innerHTML = `
          <div class="icon">🏠</div>
          <div class="label">家庭通知</div>
          <div class="title">${d.who || 'Cindy'} ${d.date}来家里</div>
          <div class="subtitle">${d.fulldate || ''}</div>
          <div class="time-box">
            <div class="time-label">到达时间</div>
            <div class="time">${d.time}</div>
          </div>
          <div class="note">${d.note || '请在家等候 ❤️'}</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;

      } else if (d.type === 'power') {
        card.innerHTML = `
          <div class="icon">⚡</div>
          <div class="label">电力通知</div>
          <div class="title">${d.date}免费用电时段</div>
          <div class="subtitle">${d.fulldate || ''}</div>
          <div class="time-box">
            <div class="time-label">免费时段</div>
            <div class="time">${d.time}</div>
          </div>
          <div class="note">请在这个时段使用洗衣机、烘干机等电器 🏠<br>可以节省电费哦！</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;

      } else if (d.type === 'word') {
        card.innerHTML = `
          <div class="icon">📚</div>
          <div class="label">今日单词</div>
          <div class="word">${d.word}</div>
          <div class="question">你知道这个词是什么意思吗？</div>
          <div class="answer-box" id="answer">
            <div class="answer-cn">${d.word_cn}</div>
            <div class="answer-desc">${d.desc}</div>
          </div>
          <div class="tap-hint" id="hint">点击屏幕查看答案 👆</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;

      } else if (d.type === 'custom') {
        card.innerHTML = `
          <div class="icon">${d.icon || '📝'}</div>
          <div class="label">${d.label || '通知'}</div>
          <div class="custom-msg">${d.message}</div>
          <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>`;
      }
    }

    // ── Tap handler ───────────────────────────────────────────
    function handleTap() {
      unlockAudio();
      const box = document.getElementById('answer');
      const hint = document.getElementById('hint');
      if (box && hint) {
        box.classList.toggle('visible');
        hint.textContent = box.classList.contains('visible')
          ? '再次点击隐藏答案' : '点击屏幕查看答案 👆';
      }
    }

    // ── Main logic ────────────────────────────────────────────
    let lastData = null;
    let words = [];
    let notices = [];

    async function loadAll() {
      const [w, n] = await Promise.all([
        fetch('words.json?t=' + Date.now()).then(r => r.json()),
        fetch('notices.json?t=' + Date.now()).then(r => r.json()),
      ]);
      words = w;
      notices = n;
    }

    async function tick() {
      const slot = getSlot();
      const badge = document.getElementById('timeslot-badge');

      let data;

      if (slot === 'afternoon') {
        // Rotate words every 30 minutes
        const idx = Math.floor(Date.now() / (30 * 60 * 1000)) % words.length;
        data = { type: 'word', ...words[idx] };
        badge.textContent = '🌤 下午 · 单词时间';
      } else if (slot === 'night') {
        data = { type: 'custom', icon: '🌙', label: '晚安', message: '爸爸妈妈晚安！<br>好好休息 😴' };
        badge.textContent = '🌙 夜间模式';
      } else {
        // Morning & evening: rotate notices every 5 minutes
        const idx = Math.floor(Date.now() / (5 * 60 * 1000)) % notices.length;
        data = notices[idx];
        badge.textContent = slot === 'morning' ? '🌅 早上' : '🌆 傍晚';
      }

      const dataStr = JSON.stringify(data);
      if (lastData && dataStr !== lastData) {
        playChime();
        setTimeout(() => { lastData = dataStr; render(data); }, 2000);
      } else {
        lastData = dataStr;
        render(data);
      }
    }

    // ── Init ──────────────────────────────────────────────────
    window.onload = async () => {
      document.documentElement.requestFullscreen?.();
      await loadAll();
      await tick();
      setInterval(tick, 60000);
    };
  </script>
</body>
</html>
