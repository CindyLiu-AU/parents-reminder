<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日单词</title>
  <script>
    window.onload = () => document.documentElement.requestFullscreen?.();
    setInterval(() => location.reload(), 60000);
    function toggleAnswer() {
      const box = document.getElementById('answer');
      const hint = document.getElementById('hint');
      box.classList.toggle('visible');
      hint.textContent = box.classList.contains('visible') ? '再次点击隐藏答案' : '点击屏幕查看答案 👆';
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 24px;
      padding: 60px 80px;
      max-width: 860px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }

    .icon { font-size: 80px; margin-bottom: 24px; }

    .label {
      font-size: 22px;
      color: #64b5f6;
      letter-spacing: 3px;
      margin-bottom: 32px;
    }

    .word {
      font-size: 96px;
      font-weight: 800;
      color: #f59e0b;
      margin-bottom: 12px;
      letter-spacing: 4px;
    }

    .question {
      font-size: 28px;
      color: #90caf9;
      margin-bottom: 48px;
    }

    .answer-box {
      background: #1a3a1a;
      border: 2px solid #2dd4bf;
      border-radius: 16px;
      padding: 32px 48px;
      margin-bottom: 32px;
      display: none;
    }

    .answer-box.visible { display: block; }

    .answer-cn {
      font-size: 42px;
      font-weight: 700;
      color: #2dd4bf;
      margin-bottom: 12px;
    }

    .answer-desc {
      font-size: 22px;
      color: #a0c4a0;
      line-height: 1.7;
    }

    .hint {
      font-size: 20px;
      color: #546e7a;
      margin-top: 8px;
    }

    .footer {
      margin-top: 40px;
      font-size: 16px;
      color: #546e7a;
    }
  </style>
</head>
<body onclick="toggleAnswer()">
  <div class="card">
    <div class="icon">📚</div>
    <div class="label">今日单词</div>
    <div class="word">Hobart</div>
    <div class="question">你知道这个词是什么意思吗？</div>

    <div class="answer-box" id="answer">
      <div class="answer-cn">霍巴特</div>
      <div class="answer-desc">
        澳大利亚塔斯马尼亚州的首府 🏙️<br>
        就是 Cindy 住的城市！
      </div>
    </div>

    <div class="hint" id="hint">点击屏幕查看答案 👆</div>

    <div class="footer">Cindy 发送 · 如有疑问请联系 Cindy</div>
  </div>
</body>
</html>
