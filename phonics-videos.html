<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>自然拼读视频课 Phonics Videos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1628;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding-bottom: 100px;
      touch-action: manipulation;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 50;
      background: #0d1b2a;
      border-bottom: 1px solid #1e3a5f;
      padding: 16px 20px 14px;
    }
    .top-row { display: flex; align-items: center; gap: 12px; }
    .top-row h1 { font-size: 26px; font-weight: 800; color: #f59e0b; }
    .top-row p  { font-size: 14px; color: #546e7a; margin-top: 3px; }
    .badge {
      margin-left: auto;
      background: #1e3a5f;
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 13px;
      color: #7dd3fc;
      white-space: nowrap;
    }

    .cards-wrap { padding: 20px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .vid-card {
      background: #112240;
      border: 1.5px solid #1e3a5f;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .vid-card:hover  { border-color: #3b7dd8; }
    .vid-card:active { transform: scale(.97); }

    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0d1b2a;
      overflow: hidden;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.25);
      font-size: 40px;
      opacity: 0;
      transition: opacity .2s;
    }
    .vid-card:hover .play-overlay { opacity: 1; }

    .lesson-num {
      position: absolute;
      top: 8px; left: 8px;
      background: #f59e0b;
      color: #1a1000;
      font-size: 13px;
      font-weight: 800;
      border-radius: 8px;
      padding: 3px 9px;
      line-height: 1.4;
    }

    .vid-body { padding: 12px 14px 14px; }
    .vid-title {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Modal overlay for embedded player */
    .modal-bg {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.85);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: #0d1b2a;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 760px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1e3a5f;
    }
    .modal-title {
      font-size: 15px; font-weight: 700; color: #f0f4f8;
      max-width: calc(100% - 50px);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .modal-close {
      background: #1e3a5f; border: none; color: #94a3b8;
      font-size: 20px; width: 36px; height: 36px;
      border-radius: 8px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #2e5a8f; color: #f0f4f8; }
    .embed-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
    }
    .embed-wrap iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    .back-btn {
      position: fixed; bottom: 28px; right: 20px;
      text-decoration: none; font-weight: 700; font-size: 16px;
      background: #f59e0b; color: #1a1000;
      border-radius: 24px; padding: 12px 24px;
      box-shadow: 0 4px 16px rgba(245,158,11,.4); z-index: 100;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-row">
    <div>
      <h1>🎬 自然拼读视频课</h1>
      <p>英语自然拼读法 · 点击每集观看</p>
    </div>
    <div class="badge">共 35 集</div>
  </div>
</div>

<div class="cards-wrap">
  <div class="cards-grid" id="grid"></div>
</div>

<!-- Modal player -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="embed-wrap">
      <iframe id="modal-iframe" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
    </div>
  </div>
</div>

<a class="back-btn" href="phonics.html">← 返回</a>

  { n:32, id:'WS1mP1UOVlw', title:'英语自然拼读法第32课 · 如何轻松掌握英语词汇？前缀词根记忆法' },
  { n:33, id:'ZkEpEk-15jU', title:'英语自然拼读法第33课 · 单词后缀 "-cial" 和 "-tial" 的拼读规则' },
  { n:34, id:'TSYlkPiXHHc', title:'英语自然拼读法第34课 · 单音节词双写辅音规则' },

function openVideo(v) {
  document.getElementById('modal-title').textContent = '第' + v.n + '课 · ' + v.title;
  document.getElementById('modal-iframe').src =
    'https://www.youtube.com/embed/' + v.id + '?autoplay=1&rel=0';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-iframe').src = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.getElementById('grid').innerHTML = VIDEOS.map(v => `
  <div class="vid-card" onclick="openVideo(${JSON.stringify(v).replace(/"/g,'&quot;')})">
    <div class="thumb-wrap">
      <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"
           alt="第${v.n}课" loading="lazy">
      <div class="play-overlay">▶️</div>
      <div class="lesson-num">第 ${v.n} 课</div>
    </div>
    <div class="vid-body">
      <div class="vid-title">${v.title}</div>
    </div>
  </div>`).join('');
</script>
</body>
</html>
