<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Cindy 的心意</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 24px 32px 100px;
      max-width: 1280px;
      margin: 0 auto;
    }

    #list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    header {
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e3a5f;
    }

    header h1 {
      font-size: 36px;
      font-weight: 700;
      color: #f59e0b;
    }

    header p {
      font-size: 20px;
      color: #546e7a;
      margin-top: 6px;
    }

    .week-card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .week-title {
      font-size: 24px;
      font-weight: 700;
      color: #64b5f6;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .order-meta {
      font-size: 18px;
      color: #546e7a;
      margin-bottom: 18px;
    }

    /* Full order section */
    .section-label {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #546e7a;
      margin-bottom: 10px;
      margin-top: 18px;
    }

    .section-label:first-of-type { margin-top: 0; }

    .toggle-btn {
      background: none;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #546e7a;
      font-size: 18px;
      padding: 4px 10px;
      cursor: pointer;
      float: right;
      margin-top: -2px;
    }

    .toggle-btn:hover { color: #90caf9; border-color: #90caf9; }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #0d1b2a;
      font-size: 20px;
    }

    .item-row:last-of-type { border-bottom: none; }
    .item-name { color: #cfd8e3; flex: 1; padding-right: 12px; }
    .item-amount { color: #90a4ae; font-weight: 600; white-space: nowrap; }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #1e3a5f;
    }

    .total-label {
      font-size: 20px;
      font-weight: 700;
      color: #90caf9;
    }

    .total-amount {
      font-size: 28px;
      font-weight: 800;
      color: #90caf9;
    }

    /* Parent section */
    .parent-section {
      background: #0d2137;
      border: 1px solid #f59e0b44;
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 18px;
    }

    .parent-section-title {
      font-size: 20px;
      font-weight: 700;
      color: #f59e0b;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .parent-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #1e3a5f44;
      font-size: 20px;
    }

    .parent-item-row:last-of-type { border-bottom: none; }
    .parent-item-name { color: #e2e8f0; flex: 1; padding-right: 12px; }
    .parent-item-amount { color: #f59e0b; font-weight: 700; white-space: nowrap; }

    .parent-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 2px solid #f59e0b44;
    }

    .parent-total-label {
      font-size: 20px;
      font-weight: 700;
      color: #fbbf24;
    }

    .parent-total-amount {
      font-size: 34px;
      font-weight: 800;
      color: #4ade80;
    }

    .parent-note {
      font-size: 18px;
      color: #546e7a;
      margin-top: 8px;
    }

    .transfer-badge {
      display: block;
      width: 100%;
      text-align: center;
      margin-top: 16px;
      padding: 14px 0;
      border-radius: 12px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .badge-pending {
      background: #ff4d4d22;
      border: 2px solid #ff4d4d;
      color: #ff6b6b;
    }

    .badge-done {
      background: #4ade8022;
      border: 2px solid #4ade80;
      color: #4ade80;
    }

    .collapsible { overflow: hidden; transition: max-height 0.3s ease; }

    .back-btn {
      position: fixed;
      bottom: 32px;
      right: 28px;
      font-size: 18px;
      color: #1a1000;
      text-decoration: none;
      background: #f59e0b;
      border: 2px solid #f59e0b;
      border-radius: 24px;
      padding: 14px 28px;
      z-index: 100;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    }
  </style>
</head>
<body>

  <header>
    <h1>🎁 Cindy 的心意</h1>
    <p>每周 Coles 订单记录 · 爸妈部分单独列出</p>
  </header>

  <div id="list">加载中...</div>
  <a class="back-btn" href="index.html">← 返回</a>

  <script>
    fetch('spending.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (!data.length) {
          document.getElementById('list').innerHTML = '<p style="color:#546e7a">暂无记录</p>';
          return;
        }

        const sorted = [...data].sort((a, b) => b.weekStart.localeCompare(a.weekStart));

        document.getElementById('list').innerHTML = sorted.map((week, wi) => {
          const items = week.items || [];
          const parentItems = items.filter(i => i.forParents);
          const orderTotal = items.reduce((s, i) => s + (i.amount || 0), 0);
          const parentTotal = parentItems.reduce((s, i) => s + (i.amount || 0), 0);

          const allItemsHTML = items.map(i => `
            <div class="item-row">
              <span class="item-name">${i.name}${i.forParents ? ' <span style="font-size:11px;color:#f59e0b44">★</span>' : ''}</span>
              <span class="item-amount">$${i.amount.toFixed(2)}</span>
            </div>`).join('');

          const parentItemsHTML = parentItems.map(i => `
            <div class="parent-item-row">
              <span class="parent-item-name">${i.name}</span>
              <span class="parent-item-amount">$${i.amount.toFixed(2)}</span>
            </div>`).join('');

          const colId = `order-${wi}`;
          const metaParts = [];
          if (week.orderNumber) metaParts.push(`订单 #${week.orderNumber}`);
          if (week.deliveryDate) metaParts.push(`送达 ${week.deliveryDate}`);
          if (week.note) metaParts.push(week.note);

          return `
            <div class="week-card">
              <div class="week-title">📅 ${week.week}</div>
              ${metaParts.length ? `<div class="order-meta">${metaParts.join(' · ')}</div>` : ''}

              <div class="section-label">
                全部商品
                <button class="toggle-btn" onclick="toggleOrder('${colId}', this)">展开 ▼</button>
              </div>
              <div class="collapsible" id="${colId}" style="max-height:0px">
                ${allItemsHTML}
                <div class="total-row">
                  <span class="total-label">订单合计</span>
                  <span class="total-amount">$${orderTotal.toFixed(2)}</span>
                </div>
              </div>

              ${parentItems.length ? `
              <div class="parent-section">
                <div class="parent-section-title">🧧 爸妈的部分</div>
                ${parentItemsHTML}
                <div class="parent-total-row">
                  <span class="parent-total-label">爸妈转账金额</span>
                  <span class="parent-total-amount">$${parentTotal.toFixed(2)}</span>
                </div>
                ${week.transferred
                  ? `<div class="transfer-badge badge-done">✅ 已转账</div>`
                  : `<div class="transfer-badge badge-pending">⏳ 未转账</div>`}
              </div>` : ''}
            </div>`;
        }).join('');
      });

    function toggleOrder(id, btn) {
      const el = document.getElementById(id);
      if (el.style.maxHeight === '0px') {
        el.style.maxHeight = '2000px';
        btn.textContent = '收起 ▲';
      } else {
        el.style.maxHeight = '0px';
        btn.textContent = '展开 ▼';
      }
    }
  </script>
</body>
</html>
