<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cindy 的心意</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2a;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 24px 20px 100px;
    }

    header {
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e3a5f;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f59e0b;
    }

    header p {
      font-size: 14px;
      color: #546e7a;
      margin-top: 6px;
    }

    .week-card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .week-title {
      font-size: 16px;
      font-weight: 700;
      color: #64b5f6;
      letter-spacing: 1px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e3a5f;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #0d1b2a;
      font-size: 17px;
    }

    .item-row:last-of-type { border-bottom: none; }

    .item-name { color: #e2e8f0; }

    .item-amount { color: #f59e0b; font-weight: 700; }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 2px solid #1e3a5f;
    }

    .total-label {
      font-size: 18px;
      font-weight: 700;
      color: #90caf9;
    }

    .total-amount {
      font-size: 26px;
      font-weight: 800;
      color: #4ade80;
    }

    .empty {
      color: #546e7a;
      font-size: 15px;
      padding: 8px 0;
    }

    .back-btn {
      position: fixed;
      bottom: 32px;
      right: 28px;
      font-size: 18px;
      color: #64b5f6;
      text-decoration: none;
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 24px;
      padding: 14px 28px;
      z-index: 100;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎁 Cindy 的心意</h1>
    <p>每周为爸爸妈妈采购的物品记录</p>
  </header>

  <div id="list">加载中...</div>
  <a class="back-btn" href="index.html">← 返回</a>

  <script>
    fetch('spending.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (!data.length) {
          document.getElementById('list').innerHTML = '<p style="color:#546e7a">暂无记录</p>';
          return;
        }

        const sorted = [...data].sort((a, b) => b.weekStart.localeCompare(a.weekStart));

        document.getElementById('list').innerHTML = sorted.map(week => {
          const items = week.items || [];
          const total = items.reduce((sum, i) => sum + (i.amount || 0), 0);

          const itemsHTML = items.length
            ? items.map(i => `
                <div class="item-row">
                  <span class="item-name">${i.name}</span>
                  <span class="item-amount">$${i.amount.toFixed(2)}</span>
                </div>`).join('')
            : '<div class="empty">暂无项目</div>';

          return `
            <div class="week-card">
              <div class="week-title">📅 ${week.week}</div>
              ${itemsHTML}
              ${items.length ? `
              <div class="total-row">
                <span class="total-label">合计</span>
                <span class="total-amount">$${total.toFixed(2)}</span>
              </div>` : ''}
            </div>`;
        }).join('');
      });
  </script>
</body>
</html>
