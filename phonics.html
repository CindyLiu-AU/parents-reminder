<!DOCTYPE html>
<html lang="zh">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }


    body {
      background: #0a1628;
      color: #f0f4f8;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding-bottom: 100px;
      touch-action: manipulation;
    }

    /* ── Sticky Header ── */
    .top-bar {
      position: sticky; top: 0; z-index: 50;
      background: #0d1b2a;
      border-bottom: 1px solid #1e3a5f;
      padding: 16px 20px 12px;
    }
    .top-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .top-row h1 { font-size: 28px; font-weight: 800; color: #f59e0b; }
    .top-row p  { font-size: 15px; color: #546e7a; }

    /* Progress */
    .prog-wrap { margin-left: auto; text-align: right; }
    .prog-label { font-size: 12px; color: #64748b; margin-bottom: 5px; }
    .prog-bar   { width: 140px; height: 7px; background: #1e3a5f; border-radius: 4px; overflow: hidden; margin-left: auto; }
    .prog-fill  { height: 100%; background: linear-gradient(90deg,#22c55e,#86efac); border-radius: 4px; transition: width .5s; }

    /* Tabs */
    .tabs { display: flex; gap: 6px; overflow-x: auto; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      border: 1.5px solid #1e3a5f;
      border-radius: 20px;
      background: #112240;
      color: #64748b;
      font-family: inherit;
      font-size: 18px; font-weight: 700;
      padding: 10px 22px;
      cursor: pointer;
      transition: all .2s;
    }
    .tab .cnt { font-size: 13px; opacity: .7; margin-left: 4px; }
    .tab.active { color: #0a1628; border-color: transparent; }

    /* ── Cards ── */
    .cards-wrap { padding: 20px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .ph-card {
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--bg);
      overflow: hidden;
    }

    /* Letter hero */
    .ph-hero {
      padding: 28px 16px 18px;
      text-align: center;
      background: var(--hero);
      border-bottom: 2px solid var(--border);
    }
    .ph-letters {
      font-size: 110px; font-weight: 900; line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 40px var(--glow);
      letter-spacing: -2px;
      text-transform: lowercase;
    }
    .ph-ipa {
      font-size: 24px; color: var(--accent);
      opacity: .7; margin-top: 6px; font-family: serif; letter-spacing: .04em;
    }

    /* Body */
    .ph-body { padding: 18px 20px 20px; }

    .ph-example { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .ph-emoji   { font-size: 36px; }
    .ph-word    { font-size: 28px; color: #94a3b8; font-weight: 600; }
    .ph-word em { color: var(--accent); font-style: normal; }
    .ph-word-cn { font-size: 28px; color: #475569; font-weight: 600; }

    .ph-tip {
      font-size: 17px; color: #64748b; line-height: 1.65;
      margin-bottom: 16px; min-height: 48px;
    }

    /* Buttons */
    .ph-btns { display: flex; gap: 8px; }
    .ph-btn {
      flex: 1; border: none; border-radius: 12px;
      padding: 10px 4px 12px; font-size: 20px; line-height: 1;
      cursor: pointer; font-family: inherit;
      background: #112240; color: #546e7a;
      transition: all .15s;
      touch-action: manipulation;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .ph-btn-label { font-size: 12px; line-height: 1; }
    .ph-btn:hover:not(:disabled) { background: #1e3a5f; color: #94a3b8; }
    .ph-btn.lit    { background: var(--accent); color: #000; }
    .ph-btn.rec-on { background: #ef4444; color: #fff; animation: blink 1s infinite; }
    .ph-btn:disabled { opacity: .25; cursor: default; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Back button ── */
    .back-btn {
      position: fixed; bottom: 28px; right: 20px;
      text-decoration: none; font-weight: 700; font-size: 16px;
      background: #f59e0b; color: #1a1000;
      border-radius: 24px; padding: 12px 24px;
      box-shadow: 0 4px 16px rgba(245,158,11,.4); z-index: 100;
    }
    .page-tabs {
      display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; flex-shrink: 0;
    }
    .page-tab {
      padding: 10px 24px; border-radius: 20px;

      text-decoration: none;
      border: 1px solid #1e3a5f; background: #112240; color: #7b9eb5;
      transition: all 0.2s;
    }
    .page-tab:hover { border-color: #3b7dd8; color: #90caf9; }
    .page-tab.active {
      background: #f59e0b22; border-color: #f59e0b; color: #f59e0b;
    }
  </style>

const TOTAL   = ALL_IDS.length;

/* ── State ── */

let mediaRecorder = null;
let activeRecId   = null;
let recChunks     = [];
let recTimer      = null;

/* ── Utils ── */
function hilite(word, sub) {
  const i = word.toLowerCase().indexOf(sub.toLowerCase());
  if (i < 0) return word;
  return word.slice(0, i) + '<em>' + word.slice(i, i + sub.length) + '</em>' + word.slice(i + sub.length);
}

function recKey(id) { return 'ph_rec_' + id; }
function hasRec(id) { return !!localStorage.getItem(recKey(id)); }

function updateProgress() {
  const done = ALL_IDS.filter(hasRec).length;
  document.getElementById('prog-label').textContent = `已练习 ${done} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width  = (done / TOTAL * 100) + '%';
}

/* ── Web Audio API (no media session / no browser UI) ── */
let _ctx = null;
const _bufCache = {};

async function _getCtx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') await _ctx.resume();
  return _ctx;
}

async function _playBuf(buf) {
  const ctx = await _getCtx();
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
}

async function playAudio(path, e) {
  e && e.stopPropagation();
  try {
    const ctx = await _getCtx();
    if (!_bufCache[path]) {
      const resp = await fetch(path + '?v=1');
      const ab   = await resp.arrayBuffer();
      _bufCache[path] = await ctx.decodeAudioData(ab);
    }
    await _playBuf(_bufCache[path]);
  } catch(err) {}
}

async function playRec(id, e) {
  e && e.stopPropagation();
  const data = localStorage.getItem(recKey(id));
  if (!data) return;
  try {
    const ctx    = await _getCtx();
    const b64    = data.split(',')[1];
    const bin    = atob(b64);
    const ab     = new ArrayBuffer(bin.length);
    const view   = new Uint8Array(ab);
    for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
    const buf    = await ctx.decodeAudioData(ab);
    await _playBuf(buf);
  } catch(err) {}
}

/* ── Recording ── */
function startRec(id, e) {
  e && e.stopPropagation();

  // If already recording this card → stop
  if (activeRecId === id && mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  // Stop any other ongoing recording
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    recChunks  = [];
    activeRecId = id;
    mediaRecorder = new MediaRecorder(stream);

    const recBtn = document.getElementById('rec-' + id);
    if (recBtn) { recBtn.textContent = '⏹️'; recBtn.classList.add('rec-on'); }

    mediaRecorder.ondataavailable = e => recChunks.push(e.data);
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      clearTimeout(recTimer);
      const blob   = new Blob(recChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onloadend = () => {
        localStorage.setItem(recKey(id), reader.result);
        resetRecBtn(id);
        updateProgress();
      };
      reader.readAsDataURL(blob);
      activeRecId = null;
    };

    mediaRecorder.start();
    recTimer = setTimeout(() => { if (mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 8000);
  }).catch(() => alert('请允许麦克风权限'));
}

function clearRec(id, e) {
  e && e.stopPropagation();
  localStorage.removeItem(recKey(id));
  resetRecBtn(id);
  updateProgress();
}

function resetRecBtn(id) {
  const recBtn  = document.getElementById('rec-'  + id);
  const playBtn = document.getElementById('play-' + id);
  const delBtn  = document.getElementById('del-'  + id);
  if (!recBtn) return;
  recBtn.textContent = '🎙️'; recBtn.classList.remove('rec-on');
  const got = hasRec(id);
  if (playBtn) { playBtn.disabled = !got; playBtn.classList.toggle('lit', got); }
  if (delBtn)  { delBtn.disabled  = !got; }
}

function tabAccent(tabId) {
  return TABS.find(t => t.id === tabId) || TABS[0];

  const el = document.getElementById('tabs');

      : '';
    return `<button class="tab${active?' active':''}" ${style} onclick="switchTab('${t.id}')">${t.label}<span class="cnt">${count}</span></button>`;
  }).join('');
}

        <div class="ph-btns">
          <button class="ph-btn" title="听发音"
            onclick="playAudio('${item.audio}',event)">🔊<span class="ph-btn-label">听发音</span></button>
          <button class="ph-btn" id="rec-${item.id}" title="录音"
            onclick="startRec('${item.id}',event)">🎙️<span class="ph-btn-label">录音</span></button>
          <button class="ph-btn ${got?'lit':''}" id="play-${item.id}" title="听录音"
            onclick="playRec('${item.id}',event)" ${got?'':'disabled'}>▶️<span class="ph-btn-label">听录音</span></button>
          <button class="ph-btn" id="del-${item.id}" title="删除"
            onclick="clearRec('${item.id}',event)" ${got?'':'disabled'}>🗑️<span class="ph-btn-label">删除录音</span></button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  renderCards();
}

/* ── Init ── */
renderTabs();
renderCards();
updateProgress();
</script>
<script src="theme.js"></script>
</body>
</html>
