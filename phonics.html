    /* ── Sticky Header ── */
    .top-bar {

      padding: 16px 20px 12px;

    .prog-label { font-size: 12px; color: #64748b; margin-bottom: 5px; }
    .prog-bar   { width: 140px; height: 7px; background: #1e3a5f; border-radius: 4px; overflow: hidden; margin-left: auto; }
    .prog-fill  { height: 100%; background: linear-gradient(90deg,#22c55e,#86efac); border-radius: 4px; transition: width .5s; }

    /* Tabs */
    .tabs { display: flex; gap: 6px; overflow-x: auto; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      border: 1.5px solid #1e3a5f;
      border-radius: 20px;
      background: #112240;
      color: #64748b;
      font-family: inherit;

      cursor: pointer;

    .tab .cnt { font-size: 13px; opacity: .7; margin-left: 4px; }
    .tab.active { color: #0a1628; border-color: transparent; }

    .cards-wrap { padding: 20px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .ph-card {
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--bg);
      overflow: hidden;
    }

    /* Letter hero */
    .ph-hero {
      padding: 28px 16px 18px;
      text-align: center;
      background: var(--hero);
      border-bottom: 2px solid var(--border);
    }
    .ph-letters {
      font-size: 110px; font-weight: 900; line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 40px var(--glow);
      letter-spacing: -2px;
      text-transform: lowercase;
    }
    .ph-ipa {
      font-size: 24px; color: var(--accent);
      opacity: .7; margin-top: 6px; font-family: serif; letter-spacing: .04em;
    }

    /* Body */
    .ph-body { padding: 18px 20px 20px; }

    .ph-example { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .ph-emoji   { font-size: 36px; }
    .ph-word    { font-size: 28px; color: #94a3b8; font-weight: 600; }
    .ph-word em { color: var(--accent); font-style: normal; }

    .ph-tip {
      font-size: 17px; color: #64748b; line-height: 1.65;
      margin-bottom: 16px; min-height: 48px;
    }

    /* Buttons */
    .ph-btns { display: flex; gap: 8px; }
    .ph-btn {
      flex: 1; border: none; border-radius: 12px;
      padding: 14px 4px; font-size: 22px; line-height: 1;
      cursor: pointer; font-family: inherit;
      background: #112240; color: #546e7a;
      transition: all .15s;

    .ph-btn.rec-on { background: #ef4444; color: #fff; animation: blink 1s infinite; }

const ALL_IDS = Object.values(DATA).flat().map(d => d.id);
const TOTAL   = ALL_IDS.length;

/* ── State ── */
let activeTab = 'short';
let mediaRecorder = null;
let activeRecId   = null;
let recChunks     = [];
let recTimer      = null;

/* ── Utils ── */
function hilite(word, sub) {
  const i = word.toLowerCase().indexOf(sub.toLowerCase());
  if (i < 0) return word;
  return word.slice(0, i) + '<em>' + word.slice(i, i + sub.length) + '</em>' + word.slice(i + sub.length);
}

function recKey(id) { return 'ph_rec_' + id; }
function hasRec(id) { return !!localStorage.getItem(recKey(id)); }

function updateProgress() {
  const done = ALL_IDS.filter(hasRec).length;
  document.getElementById('prog-label').textContent = `已练习 ${done} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width  = (done / TOTAL * 100) + '%';
}

/* ── Web Audio API (no media session / no browser UI) ── */
let _ctx = null;
const _bufCache = {};

async function _getCtx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') await _ctx.resume();
  return _ctx;
}

async function _playBuf(buf) {
  const ctx = await _getCtx();
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
}

async function playAudio(path, e) {
  e && e.stopPropagation();
  try {
    const ctx = await _getCtx();
    if (!_bufCache[path]) {
      const resp = await fetch(path + '?v=1');
      const ab   = await resp.arrayBuffer();
      _bufCache[path] = await ctx.decodeAudioData(ab);
    }
    await _playBuf(_bufCache[path]);
  } catch(err) {}
}

async function playRec(id, e) {
  e && e.stopPropagation();
  const data = localStorage.getItem(recKey(id));
  if (!data) return;
  try {
    const ctx    = await _getCtx();
    const b64    = data.split(',')[1];
    const bin    = atob(b64);
    const ab     = new ArrayBuffer(bin.length);
    const view   = new Uint8Array(ab);
    for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
    const buf    = await ctx.decodeAudioData(ab);
    await _playBuf(buf);
  } catch(err) {}
}

/* ── Video ── */
function openVideo(url, e) {
  e && e.stopPropagation();
  window.open(url, '_blank');
}

/* ── Recording ── */
function startRec(id, e) {
  e && e.stopPropagation();

  // If already recording this card → stop
  if (activeRecId === id && mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  // Stop any other ongoing recording
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    recChunks  = [];
    activeRecId = id;
    mediaRecorder = new MediaRecorder(stream);

    const recBtn = document.getElementById('rec-' + id);
    if (recBtn) { recBtn.textContent = '⏹️'; recBtn.classList.add('rec-on'); }

    mediaRecorder.ondataavailable = e => recChunks.push(e.data);
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      clearTimeout(recTimer);
      const blob   = new Blob(recChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onloadend = () => {
        localStorage.setItem(recKey(id), reader.result);
        resetRecBtn(id);
        updateProgress();
      };
      reader.readAsDataURL(blob);
      activeRecId = null;
    };

    mediaRecorder.start();
    recTimer = setTimeout(() => { if (mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 8000);
  }).catch(() => alert('请允许麦克风权限'));
}

function clearRec(id, e) {
  e && e.stopPropagation();
  localStorage.removeItem(recKey(id));
  resetRecBtn(id);
  updateProgress();
}

function resetRecBtn(id) {
  const recBtn  = document.getElementById('rec-'  + id);
  const playBtn = document.getElementById('play-' + id);
  const delBtn  = document.getElementById('del-'  + id);
  if (!recBtn) return;
  recBtn.textContent = '🎙️'; recBtn.classList.remove('rec-on');
  const got = hasRec(id);
  if (playBtn) { playBtn.disabled = !got; playBtn.classList.toggle('lit', got); }
  if (delBtn)  { delBtn.disabled  = !got; }
}

/* ── Render ── */
function tabAccent(tabId) {
  return TABS.find(t => t.id === tabId) || TABS[0];
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = TABS.map(t => {
    const count = DATA[t.id].length;
    const active = t.id === activeTab;
    const style  = active
      ? `style="background:${t.accent};color:#0a1628;border-color:${t.accent}"`
      : '';
    return `<button class="tab${active?' active':''}" ${style} onclick="switchTab('${t.id}')">${t.label}<span class="cnt">${count}</span></button>`;
  }).join('');
}

function renderCards() {
  const tab   = TABS.find(t => t.id === activeTab);
  const items = DATA[activeTab];
  document.getElementById('cards-grid').innerHTML = items.map(item => {
    const got = hasRec(item.id);
    return `
    <div class="ph-card" style="
      --accent:${tab.accent};--bg:${tab.bg};--hero:${tab.hero};
      --border:${tab.border};--glow:${tab.glow}">
      <div class="ph-hero">
        <div class="ph-letters">${item.letters}</div>
        <div class="ph-ipa">${item.ipa}</div>
      </div>
      <div class="ph-body">
        <div class="ph-example">
          <span class="ph-emoji">${item.emoji}</span>
          <span class="ph-word">${hilite(item.word, item.hl)}</span>
        </div>
        <div class="ph-tip">${item.tip}</div>
        <div class="ph-btns">
          <button class="ph-btn" title="听发音"
            onclick="playAudio('${item.audio}',event)">🔊</button>
          ${item.video ? `<button class="ph-btn" title="看视频" onclick="openVideo('${item.video}',event)">🎬</button>` : ''}
          <button class="ph-btn" id="rec-${item.id}" title="录音（最多8秒）"
            onclick="startRec('${item.id}',event)">🎙️</button>
          <button class="ph-btn ${got?'lit':''}" id="play-${item.id}" title="听我的录音"
            onclick="playRec('${item.id}',event)" ${got?'':'disabled'}>▶️</button>
          <button class="ph-btn" id="del-${item.id}" title="清除录音"
            onclick="clearRec('${item.id}',event)" ${got?'':'disabled'}>🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  renderCards();
}

/* ── Init ── */
renderTabs();
renderCards();
updateProgress();
</script>
</body>
</html>
